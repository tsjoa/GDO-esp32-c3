cover:
  # 1. THE ENGINE (Hidden)
  - platform: secplus_gdo
    id: gdo_door_internal
    secplus_gdo_id: ${id_prefix}
    internal: true

  # 2. THE UI (Visible)
  - platform: template
    name: "Garage Door"
    id: gdo_door_template
    device_class: garage
    has_position: true
    
    position_action:
      then:
        - lambda: |-
            auto call = id(gdo_door_internal).make_call();
            if (pos > id(gdo_door_internal).position) {
              call.set_command_open();
            } else {
              call.set_command_close();
            }
            call.perform();
        - wait_until:
            condition:
              lambda: |-
                float c = id(gdo_door_internal).position;
                return (fabs(c - pos) < 0.05);
            timeout: 25s
        - lambda: |-
            auto call = id(gdo_door_internal).make_call();
            call.set_command_stop();
            call.perform();
    open_action:
      - cover.open: gdo_door_internal
    close_action:
      - cover.close: gdo_door_internal
    stop_action:
      - cover.stop: gdo_door_internal

    lambda: |-
      float actual_pos = id(gdo_door_internal).position;
      if (id(gdo_motor).state) {
        return (id(gdo_door_internal).current_operation == COVER_OPERATION_OPENING) 
          ? COVER_OPERATION_OPENING : COVER_OPERATION_CLOSING;
      }
      return actual_pos;

text_sensor:
