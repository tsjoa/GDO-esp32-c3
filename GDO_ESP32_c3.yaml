  - platform: template
    name: "Calibrate Door Travel"
    icon: "mdi:ruler"
    on_press:
      - logger.log: "Starting calibration: Closing door first..."
      - cover.close: gdo_door_internal
      - wait_until:
          binary_sensor.is_off: gdo_motor
      - logger.log: "Door closed. Starting opening timer..."
      - cover.open: gdo_door_internal        